{{ define "main" }}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="fm-page-title mb-1">{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="fm-page-subtitle mb-4">{{ . }}</p>{{ end }}
      <hr class="fm-divider mb-5">
      <div class="fm-prose">
        {{ .Content }}
      </div>
    </div>
  </div>
</div>
{{ end }}
